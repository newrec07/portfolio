backend:
  name: github
  repo: your-github-id/portfolio # [중요] 본인 깃허브 ID로 수정하세요
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "essays"
    label: "Essays"
    folder: "content/essays"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Summary (Paywall Preview)", name: "summary", widget: "text", hint: "메인 페이지에 보일 3줄 요약" }
      - { label: "Body (Full Text)", name: "body", widget: "markdown", hint: "에세이 전체 내용" }
