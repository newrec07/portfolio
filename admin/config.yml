backend:
  name: github
  repo: newrec07/portfolio
  branch: main
  auth_type: pkce # 이 설정을 넣으면 별도의 서버 없이 로그인이 됩니다.

site_url: https://your-site.vercel.app # 여기에 본인 사이트 주소를 넣으세요.
display_url: https://your-site.vercel.app

media_folder: "images"
public_folder: "/images"

collections:
  - name: "essays"
    label: "Essays"
    folder: "content/essays"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Summary (Paywall Preview)", name: "summary", widget: "text", hint: "메인 페이지에 보일 3줄 요약" }
      - { label: "Body (Full Text)", name: "body", widget: "markdown", hint: "에세이 전체 내용" }
