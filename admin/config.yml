backend:
  name: github
  repo: newrec07/portfolio
  branch: main
  auth_type: pkce
  app_id: Ov23liTzZHGs0SzuPtvs

# [주의] 아래 주소를 본인의 실제 버셀 주소로 정확히 고쳐주세요
site_url: https://portfolio-newrec07.vercel.app
display_url: https://portfolio-newrec07.vercel.app

media_folder: "images"
public_folder: "/images"

collections:
  - name: "essays"
    label: "Essays"
    folder: "content/essays"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Summary (Paywall Preview)", name: "summary", widget: "text" }
      - { label: "Body (Full Text)", name: "body", widget: "markdown" }
